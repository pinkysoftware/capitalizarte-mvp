name: Android APK Build

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npm install metro metro-config @react-native/metro-config --legacy-peer-deps

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Create JS Bundle
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            --minify true \
            2>&1

      - name: Check bundle
        run: |
          if [ -f android/app/src/main/assets/index.android.bundle ]; then
            echo "SUCCESS: Bundle created"
            ls -lh android/app/src/main/assets/
          else
            echo "FAIL: Bundle not created"
            ls -la android/app/src/main/assets/ 2>/dev/null
            exit 1
          fi

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 | tail -40

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: capitalizarte-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
