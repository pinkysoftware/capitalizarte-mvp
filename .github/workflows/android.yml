name: Android APK Build

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Create JS Bundle
        run: |
          npx expo export --platform android
          mkdir -p android/app/src/main/assets
          cp dist/_expo/static/js/android/*.hbc android/app/src/main/assets/index.android.bundle 2>/dev/null || \
          cp dist/_expo/static/js/android/*.js android/app/src/main/assets/index.android.bundle 2>/dev/null || \
          echo "Bundle copied"

      - name: Verify bundle exists
        run: ls -lh android/app/src/main/assets/

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -q

      - name: Verify APK
        run: ls -lh android/app/build/outputs/apk/debug/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: capitalizarte-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
